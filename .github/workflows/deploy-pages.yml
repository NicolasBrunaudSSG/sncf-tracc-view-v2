name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/frontend/**'
      - 'app/data/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build (mode statique GitHub Pages)
        working-directory: app/frontend
        run: npm run build:pages

      - name: Hash GeoJSON data files and generate manifest
        run: |
          node app/frontend/scripts/hash-data.js app/data app/frontend/dist/data
          echo "--- Contenu dist/data ---"
          ls app/frontend/dist/data/
          cat app/frontend/dist/data/manifest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
