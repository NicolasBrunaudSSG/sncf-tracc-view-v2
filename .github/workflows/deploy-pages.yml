name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/frontend/**'
      - 'app/data/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build (mode statique GitHub Pages)
        working-directory: app/frontend
        run: npm run build:pages

      - name: Copy GeoJSON data files into dist/data
        run: |
          mkdir -p app/frontend/dist/data/infra
          # Réseau et HEV
          for f in reseau_national.geojson hev_reference.geojson hev_2050.geojson hev_2065.geojson hev_2100.geojson carroyage_light.geojson metadata.json; do
            if [ -f "app/data/$f" ]; then
              cp "app/data/$f" "app/frontend/dist/data/$f"
              echo "Copied $f ($(du -sh app/data/$f | cut -f1))"
            else
              echo "WARN: $f not found in app/data — skipping"
            fi
          done
          # Infrastructures
          for f in liste-des-gares.geojson liste-des-passerelles.geojson liste-des-ponts-route.geojson liste-ouvrages-en-terre.geojson; do
            if [ -f "app/data/infra/$f" ]; then
              cp "app/data/infra/$f" "app/frontend/dist/data/infra/$f"
              echo "Copied infra/$f"
            fi
          done
          echo "--- Taille totale dist/data ---"
          du -sh app/frontend/dist/data/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
